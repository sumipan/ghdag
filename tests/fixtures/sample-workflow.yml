name: sample-pipeline

triggers:
  - label: "pipeline:draft-ready"
    handler: draft_design
  - label: "pipeline:develop-ready"
    handler: impl
  - label: "pipeline:merge-ready"
    handler: merge

handlers:
  draft_design:
    steps:
      - template: draft-design
        model: claude-opus-4-6

  impl:
    steps:
      - template: impl
        model: claude-sonnet-4-6

  merge:
    steps:
      - template: merge
        model: claude-opus-4-6

polling_interval: 30
