<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ghdag Dashboard</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --ok: #3fb950;
  --fail: #f85149;
  --running: #d29922;
  --pending: #8b949e;
  --rejected: #bc8cff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  padding: 16px;
}
h1 {
  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
h1 .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--ok);
  display: inline-block;
}
h1 .dot.disconnected { background: var(--fail); }
.meta {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-bottom: 12px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8125rem;
}
thead th {
  text-align: left;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text-muted);
  font-weight: 600;
  white-space: nowrap;
  position: sticky;
  top: 0;
  background: var(--bg);
}
tbody td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
tbody tr:hover { background: var(--surface); }
.col-tree { white-space: pre; font-family: "SF Mono", "Fira Code", monospace; font-size: 0.75rem; }
.col-state { white-space: nowrap; }
.col-engine { white-space: nowrap; color: var(--text-muted); }
.col-uuid { font-family: "SF Mono", monospace; font-size: 0.6875rem; color: var(--text-muted); }
.col-label { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.col-actions { white-space: nowrap; }

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 0.6875rem;
  font-weight: 600;
}
.badge-ok        { background: rgba(63,185,80,0.15); color: var(--ok); }
.badge-fail      { background: rgba(248,81,73,0.15); color: var(--fail); }
.badge-running   { background: rgba(210,153,34,0.15); color: var(--running); }
.badge-pending   { background: rgba(139,148,158,0.1); color: var(--pending); }
.badge-rejected  { background: rgba(188,140,255,0.15); color: var(--rejected); }
.badge-empty     { background: rgba(139,148,158,0.1); color: var(--pending); }
.badge-unknown   { background: rgba(139,148,158,0.1); color: var(--pending); }

.btn-retry, .btn-stop {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 0.6875rem;
  font-weight: 600;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-retry:hover {
  background: rgba(248,81,73,0.15);
  color: var(--fail);
  border-color: var(--fail);
}
.btn-stop:hover {
  background: rgba(210,153,34,0.15);
  color: var(--running);
  border-color: var(--running);
}
.btn-retry:disabled, .btn-stop:disabled {
  opacity: 0.4;
  cursor: default;
}

.link-order {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 0.6875rem;
  font-weight: 600;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  text-decoration: none;
  transition: all 0.15s;
  cursor: pointer;
}
.link-order:hover {
  background: rgba(88,166,255,0.15);
  color: var(--accent);
  border-color: var(--accent);
}

.link-result {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 0.6875rem;
  font-weight: 600;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  text-decoration: none;
  transition: all 0.15s;
  cursor: pointer;
}
.link-result:hover {
  background: rgba(63,185,80,0.15);
  color: var(--ok);
  border-color: var(--ok);
}

.empty-msg {
  text-align: center;
  padding: 48px 16px;
  color: var(--text-muted);
}

/* Responsive: hide UUID and label columns on small screens */
@media (max-width: 768px) {
  .col-uuid, .hide-mobile { display: none; }
  table { font-size: 0.75rem; }
  .col-tree { font-size: 0.6875rem; }
  body { padding: 8px; }
  h1 { font-size: 1rem; }
}
@media (max-width: 480px) {
  .col-engine { display: none; }
}
</style>
</head>
<body>

<h1>
  <span class="dot" id="status-dot"></span>
  ghdag Dashboard
</h1>
<div class="meta" id="meta">Connecting...</div>

<table>
  <thead>
    <tr>
      <th>時刻/ツリー</th>
      <th>状態</th>
      <th class="hide-mobile">エンジン/モデル</th>
      <th class="hide-mobile">UUID</th>
      <th>ラベル</th>
      <th></th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="empty-msg" id="empty-msg" style="display:none">
  タスクがありません
</div>

<script>
(function() {
  const tbody = document.getElementById('tbody');
  const meta = document.getElementById('meta');
  const dot = document.getElementById('status-dot');
  const emptyMsg = document.getElementById('empty-msg');
  let rowCount = 0;
  const retryingUuids = {};  // uuid -> 'pending' | 'done' | 'error'
  const stoppingUuids = {};  // uuid -> 'pending' | 'done' | 'error'
  let vaultName = '';

  // Load vault name from config once
  fetch('/api/config')
    .then(function(r) { return r.json(); })
    .then(function(cfg) { vaultName = cfg.vault || ''; })
    .catch(function() {});

  function badgeClass(state) {
    if (state.includes('成功')) return 'badge-ok';
    if (state.includes('失敗')) return 'badge-fail';
    if (state.includes('REJECTED')) return 'badge-rejected';
    if (state.includes('EMPTY')) return 'badge-empty';
    if (state === '実行中') return 'badge-running';
    if (state.includes('待機')) return 'badge-pending';
    return 'badge-unknown';
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function isRetryable(state) {
    return state.includes('失敗') || state.includes('REJECTED') || state.includes('EMPTY') || state.includes('その他');
  }

  function isStoppable(state) {
    return state === '実行中';
  }

  function retryTask(uuid, btn) {
    btn.disabled = true;
    btn.textContent = '...';
    retryingUuids[uuid] = 'pending';
    fetch('/api/retry', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ uuid: uuid })
    }).then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          retryingUuids[uuid] = 'done';
          setTimeout(function() { delete retryingUuids[uuid]; }, 5000);
        } else {
          retryingUuids[uuid] = 'error';
          setTimeout(function() { delete retryingUuids[uuid]; }, 5000);
        }
        renderCurrentRows();
      })
      .catch(function() {
        retryingUuids[uuid] = 'error';
        setTimeout(function() { delete retryingUuids[uuid]; }, 5000);
        renderCurrentRows();
      });
  }

  function stopTask(uuid, btn) {
    if (!confirm('エージェントプロセスを強制停止しますか？')) return;
    btn.disabled = true;
    btn.textContent = '...';
    stoppingUuids[uuid] = 'pending';
    fetch('/api/stop', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ uuid: uuid })
    }).then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          stoppingUuids[uuid] = 'done';
          setTimeout(function() { delete stoppingUuids[uuid]; }, 5000);
        } else {
          stoppingUuids[uuid] = 'error';
          setTimeout(function() { delete stoppingUuids[uuid]; }, 5000);
        }
        renderCurrentRows();
      })
      .catch(function() {
        stoppingUuids[uuid] = 'error';
        setTimeout(function() { delete stoppingUuids[uuid]; }, 5000);
        renderCurrentRows();
      });
  }

  function buildOrderLink(orderPath) {
    if (!orderPath) return '';
    var uri = 'obsidian://open?vault=' + encodeURIComponent(vaultName) + '&file=' + encodeURIComponent(orderPath);
    return '<a class="link-order" href="' + escapeHtml(uri) + '" title="' + escapeHtml(orderPath) + '">order</a>';
  }

  function buildResultLink(resultPath) {
    if (!resultPath) return '';
    var uri = 'obsidian://open?vault=' + encodeURIComponent(vaultName) + '&file=' + encodeURIComponent(resultPath);
    return '<a class="link-result" href="' + escapeHtml(uri) + '" title="' + escapeHtml(resultPath) + '">result</a>';
  }

  var lastRows = [];

  function renderRows(rows) {
    lastRows = rows;
    rowCount = rows.length;
    if (rowCount === 0) {
      tbody.innerHTML = '';
      emptyMsg.style.display = 'block';
      return;
    }
    emptyMsg.style.display = 'none';
    const html = rows.map(function(r) {
      var actions = '';

      // order link
      if (r.order_path) {
        actions += buildOrderLink(r.order_path) + ' ';
      }

      // stop button (running) or result link (completed)
      var ss = stoppingUuids[r.uuid];
      if (ss === 'pending') {
        actions += '<button class="btn-stop" disabled>...</button> ';
      } else if (ss === 'done') {
        actions += '<span class="btn-stop" style="color:var(--ok)">stopped</span> ';
      } else if (ss === 'error') {
        actions += '<button class="btn-stop" onclick="window._stop(\'' + escapeHtml(r.uuid) + '\', this)">stop</button> ';
      } else if (r.state.includes('完了') && r.result_path) {
        actions += buildResultLink(r.result_path) + ' ';
      } else if (isStoppable(r.state)) {
        actions += '<button class="btn-stop" onclick="window._stop(\'' + escapeHtml(r.uuid) + '\', this)">stop</button> ';
      }

      // retry button
      var rs = retryingUuids[r.uuid];
      if (rs === 'pending') {
        actions += '<button class="btn-retry" disabled>...</button>';
      } else if (rs === 'done') {
        actions += '<span class="btn-retry" style="color:var(--ok)">done</span>';
      } else if (rs === 'error') {
        actions += '<button class="btn-retry" onclick="window._retry(\'' + escapeHtml(r.uuid) + '\', this)">retry</button>';
      } else if (isRetryable(r.state)) {
        actions += '<button class="btn-retry" onclick="window._retry(\'' + escapeHtml(r.uuid) + '\', this)">retry</button>';
      }

      return '<tr>'
        + '<td class="col-tree">' + escapeHtml(r.tree_ts) + '</td>'
        + '<td class="col-state"><span class="badge ' + badgeClass(r.state) + '">' + escapeHtml(r.state) + '</span></td>'
        + '<td class="col-engine hide-mobile">' + escapeHtml(r.engine_model) + '</td>'
        + '<td class="col-uuid hide-mobile">' + escapeHtml(r.uuid) + '</td>'
        + '<td class="col-label">' + escapeHtml(r.cmd_preview) + '</td>'
        + '<td class="col-actions">' + actions + '</td>'
        + '</tr>';
    }).join('');
    tbody.innerHTML = html;
  }

  function renderCurrentRows() {
    if (lastRows.length > 0) renderRows(lastRows);
  }

  window._retry = retryTask;
  window._stop = stopTask;

  function connect() {
    const es = new EventSource('/api/stream');
    es.onopen = function() {
      dot.classList.remove('disconnected');
      meta.textContent = 'Connected — streaming updates';
    };
    es.onmessage = function(e) {
      try {
        const rows = JSON.parse(e.data);
        renderRows(rows);
        const now = new Date().toLocaleTimeString('ja-JP');
        meta.textContent = 'Updated ' + now + ' — ' + rowCount + ' tasks';
      } catch (err) {
        console.error('Parse error:', err);
      }
    };
    es.onerror = function() {
      dot.classList.add('disconnected');
      meta.textContent = 'Disconnected — retrying...';
      es.close();
      setTimeout(connect, 3000);
    };
  }

  // Initial fetch then switch to SSE
  fetch('/api/rows')
    .then(function(r) { return r.json(); })
    .then(renderRows)
    .catch(function() {});
  connect();
})();
</script>
</body>
</html>
